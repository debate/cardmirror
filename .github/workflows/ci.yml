name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Typecheck + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Run tests
        # File-dependent round-trip / mark-fidelity suites discover
        # fixtures via CARDMIRROR_DOCS_DIR (default `reference-docs/
        # example docs/`). On CI there are no fixtures, so those suites
        # skip cleanly and the rest of the test surface still runs.
        run: npm test
